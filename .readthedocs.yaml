# Read the Docs build configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# RTD invokes Sphinx via `docs/conf.py`. The build environment installs
# the package's docs-only dependencies (see docs/requirements.txt) but
# NOT the heavy ML stack (torch, e3nn, torch_geometric, tbmodels). Those
# are listed in `autodoc_mock_imports` in `docs/conf.py` so autodoc can
# introspect signatures without actually importing them — keeps the
# RTD build under the free-tier memory + time limits.

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    # Install the package itself in editable mode so autodoc can find
    # `tailwater.*` symbols. We deliberately DO NOT install the heavy
    # ML extras — autodoc_mock_imports in conf.py handles those.
    - method: pip
      path: .
    # Sphinx + theme + a couple of small extensions, listed in
    # docs/requirements.txt for easy local reproducibility.
    - requirements: docs/requirements.txt

formats:
  - htmlzip
  - pdf
